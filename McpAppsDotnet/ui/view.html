<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Numbers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: auto; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--vscode-editor-background, #1e1e2e);
            color: var(--vscode-editor-foreground, #cdd6f4);
        }
        .container {
            padding: 1rem 1.5rem;
        }
        .equation {
            font-size: min(4rem, 8vw);
            font-weight: 700;
            letter-spacing: 0.05em;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
            width: fit-content;
        }
        .num { color: var(--vscode-charts-blue, #89b4fa); }
        .op  { color: var(--vscode-charts-yellow, #f9e2af); margin: 0 0.3em; }
        .eq  { color: var(--vscode-charts-green, #a6e3a1); margin: 0 0.3em; }
        .result { color: var(--vscode-charts-orange, #fab387); }
        .waiting {
            font-size: 1.2rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="display" class="waiting">Waiting for input...</div>
    </div>
    <script>
    (function() {
        const display = document.getElementById('display');
        let rpcId = 1;
        const pending = new Map();

        // Listen for JSON-RPC messages from the host
        window.addEventListener('message', (event) => {
            const msg = event.data;
            if (!msg || typeof msg !== 'object') return;

            // Response to a request we sent
            if (msg.id !== undefined && msg.id !== null && (msg.result !== undefined || msg.error !== undefined)) {
                const resolve = pending.get(msg.id);
                if (resolve) {
                    pending.delete(msg.id);
                    resolve(msg);
                }
                return;
            }

            // Notification from host
            if (msg.method === 'ui/notifications/tool-input') {
                const args = msg.params?.arguments || {};
                const n1 = args.number1 ?? 3;
                const n2 = args.number2 ?? 4;
                showEquation(n1, n2, n1 + n2);
            }

            if (msg.method === 'ui/notifications/tool-result') {
                const content = msg.params?.content;
                if (Array.isArray(content)) {
                    const text = content.find(c => c.type === 'text');
                    if (text && text.text) {
                        // Parse "3 + 4 = 7" format
                        const match = text.text.match(/(-?[\d.]+)\s*\+\s*(-?[\d.]+)\s*=\s*(-?[\d.]+)/);
                        if (match) {
                            showEquation(parseFloat(match[1]), parseFloat(match[2]), parseFloat(match[3]));
                        }
                    }
                }
            }

            if (msg.method === 'ui/notifications/host-context-changed') {
                // Theme changes are applied via CSS variables by the host
            }

            // Ping
            if (msg.method === 'ping' && msg.id !== undefined) {
                send({ jsonrpc: '2.0', id: msg.id, result: {} });
            }
        });

        function showEquation(n1, n2, result) {
            display.className = 'equation';
            display.innerHTML =
                `<span class="num">${n1}</span>` +
                `<span class="op">+</span>` +
                `<span class="num">${n2}</span>` +
                `<span class="eq">=</span>` +
                `<span class="result">${result}</span>`;

            // Notify host of our rendered size
            requestAnimationFrame(() => {
                const rect = document.documentElement.getBoundingClientRect();
                send({
                    jsonrpc: '2.0',
                    method: 'ui/notifications/size-changed',
                    params: { width: Math.ceil(rect.width), height: Math.ceil(rect.height) }
                });
            });
        }

        function send(msg) {
            window.parent.postMessage(msg, '*');
        }

        function request(method, params) {
            return new Promise((resolve) => {
                const id = rpcId++;
                pending.set(id, resolve);
                send({ jsonrpc: '2.0', id, method, params });
            });
        }

        // Connect to the host
        async function connect() {
            try {
                const response = await request('ui/initialize', {
                    appInfo: { name: 'Adder', version: '1.0.0' },
                    appCapabilities: {},
                    protocolVersion: '2025-11-21'
                });

                // Send initialized notification
                send({ jsonrpc: '2.0', method: 'ui/notifications/initialized', params: {} });

                // Apply initial host context if provided
                if (response?.result?.hostContext?.theme) {
                    // Theme CSS variables are handled by the host
                }
            } catch (e) {
                console.error('Failed to connect to host:', e);
            }
        }

        connect();
    })();
    </script>
</body>
</html>
